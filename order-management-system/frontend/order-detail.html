<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMS – Detalhe do Pedido</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
    <a class="brand" href="index.html">OMS</a>
    <a href="index.html">Dashboard</a>
    <a href="customers.html">Clientes</a>
    <a href="orders.html" class="active">Pedidos</a>
</nav>
<main>
    <div class="toolbar">
        <h1 id="orderTitle">Pedido</h1>
        <div style="display:flex;gap:.75rem;align-items:center">
            <select id="newStatus">
                <option>PENDING</option>
                <option>PROCESSING</option>
                <option>SHIPPED</option>
                <option>DELIVERED</option>
                <option>CANCELLED</option>
            </select>
            <button class="btn btn-primary" onclick="updateStatus()">Atualizar Status</button>
        </div>
    </div>

    <!-- Customer info -->
    <div class="card" style="margin-bottom:1.5rem">
        <div class="label">Cliente</div>
        <div id="customerInfo" style="font-weight:600;font-size:1rem;margin-top:.3rem">–</div>
    </div>

    <!-- Items -->
    <h2>Itens do Pedido</h2>
    <div class="table-wrap" style="margin-bottom:1.5rem">
        <table>
            <thead>
                <tr><th>Produto</th><th>Qtd</th><th>Unit.</th><th>Subtotal</th><th>Ação</th></tr>
            </thead>
            <tbody id="itemsBody"></tbody>
        </table>
    </div>
    <button class="btn btn-primary" onclick="openItemModal()" style="margin-bottom:2rem">+ Adicionar Item</button>

    <!-- Status timeline -->
    <h2>Status Atual</h2>
    <div class="card">
        <span id="currentStatus" class="badge">–</span>
        <p id="updatedAt" style="margin-top:.5rem;font-size:.82rem;color:#718096"></p>
    </div>
</main>

<!-- Item modal -->
<div class="modal-backdrop" id="itemModal">
    <div class="modal">
        <h2>Adicionar Item</h2>
        <div class="form-group"><label>Produto</label><input id="productName" placeholder="Nome do produto"></div>
        <div class="form-group"><label>Quantidade</label><input id="quantity" type="number" min="1" value="1"></div>
        <div class="form-group"><label>Preço Unitário (R$)</label><input id="unitPrice" type="number" step="0.01" placeholder="0.00"></div>
        <div class="modal-actions">
            <button class="btn" onclick="closeItemModal()">Cancelar</button>
            <button class="btn btn-primary" onclick="addItem()">Adicionar</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/api.js"></script>
<script src="js/order-detail.js"></script>
</body>
</html>
