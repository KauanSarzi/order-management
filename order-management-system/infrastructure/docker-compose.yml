services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: omsdb
      POSTGRES_USER: omsuser
      POSTGRES_PASSWORD: omspass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omsuser -d omsdb"]
      interval: 10s
      retries: 5

  backend:
    build:
      context: ../backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/omsdb
      DB_USER: omsuser
      DB_PASSWORD: omspass
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
