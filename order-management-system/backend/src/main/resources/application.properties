spring.application.name=order-management-system

# Datasource (dev profile - local Docker)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/omsdb}
spring.datasource.username=${DB_USER:omsuser}
spring.datasource.password=${DB_PASSWORD:omspass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Server
server.port=8080
